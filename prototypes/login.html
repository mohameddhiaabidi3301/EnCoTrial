<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENICAR Connect — Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="theme-manager.js"></script>
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C96A;
            --bg: #050D1A;
            --card-bg: rgba(13, 31, 60, .82);
            --text: #FFF;
            --text-2: rgba(255, 255, 255, .65);
            --border: rgba(201, 168, 76, .2);
            --input-bg: rgba(255, 255, 255, .06);
        }

        [data-theme="light"] {
            --bg: #F5F7FA;
            --card-bg: rgba(255, 255, 255, .97);
            --text: #111827;
            --text-2: #374151;
            --border: rgba(0, 0, 0, .1);
            --input-bg: rgba(0, 0, 0, .05);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
            overflow-x: hidden;
            transition: background .4s, color .4s;
        }

        #particles-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            animation: orbPulse 10s ease-in-out infinite alternate;
        }

        [data-theme="light"] .orb {
            opacity: .04;
        }

        .orb-1 {
            width: 580px;
            height: 580px;
            background: radial-gradient(circle, rgba(201, 168, 76, .3), transparent);
            top: -18%;
            left: -12%;
            animation-duration: 14s;
        }

        .orb-2 {
            width: 460px;
            height: 460px;
            background: radial-gradient(circle, rgba(13, 31, 60, .9), transparent);
            bottom: -15%;
            right: -10%;
            animation-duration: 10s;
        }

        .orb-3 {
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, rgba(232, 201, 106, .22), transparent);
            top: 50%;
            left: 60%;
            animation-duration: 18s;
        }

        @keyframes orbPulse {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(20px, 16px) scale(1.09);
            }

            100% {
                transform: translate(-12px, 26px) scale(.93);
            }
        }

        .theme-corner {
            position: fixed;
            top: 1.25rem;
            right: 1.5rem;
            z-index: 200;
        }

        .theme-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--gold);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .25s;
            backdrop-filter: blur(10px);
        }

        .theme-btn:hover {
            transform: rotate(20deg);
            background: rgba(201, 168, 76, .18);
        }

        .login-card {
            position: relative;
            z-index: 2;
            background: var(--card-bg);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--border);
            border-radius: 26px;
            padding: 3rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, .45);
            animation: cardFloat .7s cubic-bezier(.2, .8, .3, 1) both;
            overflow: hidden;
        }

        [data-theme="light"] .login-card {
            box-shadow: 0 8px 32px rgba(0, 0, 0, .1);
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-light), var(--gold), transparent);
            animation: shimmer 3s linear infinite;
            background-size: 200% 100%;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        @keyframes cardFloat {
            from {
                opacity: 0;
                transform: translateY(32px) scale(.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card-logo {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            overflow: hidden;
            margin: 0 auto 1.25rem;
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(201, 168, 76, .4);
            }

            50% {
                box-shadow: 0 0 0 10px rgba(201, 168, 76, 0);
            }
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .app-name {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--gold);
        }

        .app-sub {
            font-size: 1rem;
            letter-spacing: 4px;
            color: var(--text-2);
            margin-top: .2rem;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 1.35rem;
        }

        .form-label {
            display: block;
            font-size: .8rem;
            font-weight: 600;
            color: var(--text-2);
            margin-bottom: .5rem;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
            font-size: .85rem;
            opacity: .75;
        }

        .form-input {
            width: 100%;
            padding: .85rem 1.2rem .85rem 2.75rem;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: .95rem;
            outline: none;
            transition: all .25s;
        }

        .form-input::placeholder {
            color: var(--text-2);
            opacity: .45;
        }

        .form-input:focus {
            border-color: var(--gold);
            background: rgba(201, 168, 76, .06);
            box-shadow: 0 0 0 4px rgba(201, 168, 76, .12);
        }

        .forgot {
            display: block;
            text-align: right;
            font-size: .78rem;
            color: var(--gold);
            text-decoration: none;
            margin-top: .4rem;
            font-weight: 600;
        }

        .forgot:hover {
            color: var(--gold-light);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border: none;
            border-radius: 28px;
            color: #050D1A;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all .3s;
            margin-top: 1rem;
            letter-spacing: .3px;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 16px rgba(201, 168, 76, .3);
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(201, 168, 76, .45);
            filter: brightness(1.07);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-2);
            font-size: .78rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .footer-txt {
            text-align: center;
            font-size: .83rem;
            color: var(--text-2);
        }

        .footer-txt a {
            color: var(--gold);
            font-weight: 700;
            text-decoration: none;
        }

        .footer-txt a:hover {
            color: var(--gold-light);
        }
    </style>
</head>

<body>
    <canvas id="particles-canvas"></canvas>
    <div class="orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="theme-corner"><button class="theme-btn" onclick="toggleTheme()"><i
                class="theme-toggle-icon fas fa-sun"></i></button></div>
    <div class="login-card">
        <div class="card-logo">
            <div class="logo-circle"><img src="hannibal.png" alt="ENICAR"></div>
            <div class="app-name">ENICAR</div>
            <div class="app-sub">CONNECT</div>
        </div>
        <form onsubmit="return false">
            <div class="form-group">
                <label class="form-label">Adresse Email</label>
                <div class="input-wrap"><i class="fas fa-envelope"></i><input type="email" class="form-input"
                        placeholder="nom@enicar.u-carthage.tn"></div>
            </div>
            <div class="form-group">
                <label class="form-label">Mot de passe</label>
                <div class="input-wrap"><i class="fas fa-lock"></i><input type="password" class="form-input"
                        placeholder="••••••••"></div>
                <a href="#" class="forgot">Mot de passe oublié ?</a>
            </div>
            <button class="btn-submit" onclick="window.location.href='social_feed.html'"><i
                    class="fas fa-sign-in-alt"></i>&nbsp; Se Connecter</button>
        </form>
        <div class="divider">ou</div>
        <div class="footer-txt">Pas encore de compte ? <a href="#">Demander l'accès</a></div>
    </div>
</body>

</html>
