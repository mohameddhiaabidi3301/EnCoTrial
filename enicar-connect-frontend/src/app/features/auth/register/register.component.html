<app-particles-bg />

<div class="theme-corner">
    <button class="theme-btn" (click)="theme.toggle()">
        <i class="fas" [class.fa-sun]="theme.theme()==='dark'" [class.fa-moon]="theme.theme()==='light'"></i>
    </button>
</div>

<div class="register-card">
    <div class="card-logo">
        <div class="logo-circle">
            <img src="assets/hannibal.png" alt="ENICAR" onerror="this.style.display='none'">
        </div>
        <div class="app-name">ENICAR</div>
        <div class="app-sub">INSCRIPTION</div>
    </div>

    <form (ngSubmit)="onRegister()">
        <!-- Nom & Prénom -->
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Prénom</label>
                <div class="input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" class="form-input" [(ngModel)]="firstName" name="firstName"
                        placeholder="Votre prénom" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Nom</label>
                <div class="input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" class="form-input" [(ngModel)]="lastName" name="lastName" placeholder="Votre nom"
                        required>
                </div>
            </div>
        </div>

        <!-- Email -->
        <div class="form-group">
            <label class="form-label">Adresse Email</label>
            <div class="input-wrap">
                <i class="fas fa-envelope"></i>
                <input type="email" class="form-input" [(ngModel)]="email" name="email"
                    placeholder="nom@enicar.u-carthage.tn" required>
            </div>
        </div>

        <!-- Téléphone -->
        <div class="form-group">
            <label class="form-label">Téléphone <span class="optional">(optionnel)</span></label>
            <div class="input-wrap">
                <i class="fas fa-phone"></i>
                <input type="tel" class="form-input" [(ngModel)]="phone" name="phone" placeholder="+216 99 000 000">
            </div>
        </div>

        <!-- Rôle -->
        <div class="form-group">
            <label class="form-label">Catégorie</label>
            <div class="role-grid">
                <label *ngFor="let r of roles" class="role-option" [class.active]="role === r.value">
                    <input type="radio" [(ngModel)]="role" [value]="r.value" name="role">
                    <i class="fas" [ngClass]="r.icon"></i>
                    <span>{{ r.label }}</span>
                </label>
            </div>
        </div>

        <!-- Département & Niveau -->
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Département</label>
                <div class="input-wrap">
                    <i class="fas fa-building"></i>
                    <select class="form-input form-select" [(ngModel)]="department" name="department">
                        <option value="">Sélectionner...</option>
                        <option *ngFor="let d of departments" [value]="d">{{ d }}</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Niveau</label>
                <div class="input-wrap">
                    <i class="fas fa-layer-group"></i>
                    <select class="form-input form-select" [(ngModel)]="level" name="level">
                        <option value="">Sélectionner...</option>
                        <option *ngFor="let l of levels" [value]="l">{{ l }}</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Mot de passe -->
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Mot de passe</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-input" [(ngModel)]="password" name="password"
                        placeholder="Min. 6 caractères" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Confirmer</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-input" [(ngModel)]="confirmPassword" name="confirmPassword"
                        placeholder="Même mot de passe" required>
                </div>
            </div>
        </div>

        <div class="error-msg" *ngIf="error">{{ error }}</div>

        <button type="submit" class="btn-submit" [disabled]="loading">
            <i class="fas" [class.fa-user-plus]="!loading" [class.fa-spinner]="loading"
                [class.fa-spin]="loading"></i>&nbsp;
            {{ loading ? 'Inscription...' : 'Créer mon compte' }}
        </button>
    </form>

    <div class="divider">ou</div>
    <div class="footer-txt">Déjà un compte ? <a routerLink="/login">Se connecter</a></div>
</div>
