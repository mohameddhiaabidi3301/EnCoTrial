# ===================================
# ENI CONNECT — Application Properties (MySQL)
# ===================================

# Server
server.port=8080

# DATASOURCE (MySQL / XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/eni_connect?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# 'update' va créer les tables automatiquement si elles n'existent pas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=EniConnectSecretKey2026VeryLongAndSecureStringForJWTSigning
app.jwt.expiration=86400000

# File Upload (max 10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.tn.enicar.eniconnect=DEBUG
logging.level.org.springframework.security=INFO
